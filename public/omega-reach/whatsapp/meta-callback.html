<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omega Reach • Meta Callback</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f6f8ff; color: #11131a; }
    .card { background: #fff; border: 1px solid #d9dfe9; border-radius: 14px; padding: 18px 20px; max-width: 520px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    h1 { margin: 0 0 8px; font-size: 18px; }
    p { margin: 0; color: #4d5870; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Returning to Omega Reach...</h1>
    <p>Please wait while we complete your Meta onboarding.</p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const payload = {
        source: 'omega-meta-callback',
        code: params.get('code') || '',
        state: params.get('state') || '',
        error: params.get('error') || '',
        errorDescription: params.get('error_description') || ''
      };

      const hasOpener = window.opener && !window.opener.closed;
      if (hasOpener) {
        try {
          window.opener.postMessage(payload, window.location.origin);
          window.close();
          return;
        } catch (_) {
          // fall through to redirect mode
        }
      }

      const fallback = new URL('/omega-reach/whatsapp', window.location.origin);
      if (payload.code) fallback.searchParams.set('meta_code', payload.code);
      if (payload.state) fallback.searchParams.set('meta_state', payload.state);
      if (payload.error) fallback.searchParams.set('meta_error', payload.error);
      if (payload.errorDescription) fallback.searchParams.set('meta_error_description', payload.errorDescription);
      window.location.replace(fallback.toString());
    })();
  </script>
</body>
</html>
